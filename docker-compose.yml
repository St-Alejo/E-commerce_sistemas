# docker-compose.yml — Sprint 0
# Solo Kafka y RabbitMQ. Los microservicios los agrega Steven via PR
# conforme cada persona (Luna, Nicolas) termine su servicio.
#
# Como validar el Sprint 0:
#   docker compose up
# Luego abrir http://localhost:15672 (guest/guest) y ver la UI de RabbitMQ.

services:
  # ============================
  # Broker 1: Kafka (modo KRaft, sin Zookeeper)
  # ============================
  kafka:
    image: confluentinc/cp-kafka:7.6.1

    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 10s
      retries: 20

    networks:
      - ecommerce-net

  # ============================
  # Broker 2: RabbitMQ con UI de management
  # ============================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - ecommerce-net

  # ============================
  # Microservicios: se agregaran uno por uno via Pull Request
  # cuando cada persona termine su servicio:
  #
  # - order_api          (Luna)
  # - order_processor    (Luna)
  # - analytics_service  (Luna)
  # - billing_worker     (Nicolas)
  # - inventory_worker   (Nicolas)
  # - notification_worker (Nicolas)
  # - dashboard_aggregator (Steven)
  # ============================

  billing_worker:
    build:
      context: ./services/billing_worker

    container_name: billing_worker

    depends_on:
      kafka:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672

    networks:
      - ecommerce-net

  inventory_worker:
    build:
      context: ./services/inventory_worker

    container_name: inventory_worker

    depends_on:
      kafka:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672

    networks:
      - ecommerce-net

  notification_worker:
    build:
      context: ./services/notification_worker

    container_name: notification_worker

    depends_on:
      kafka:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy

    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672

    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge