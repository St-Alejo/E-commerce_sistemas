services:
  # ============================
  # Broker 1: Kafka (modo KRaft, sin Zookeeper)
  # ============================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - ecommerce-net

  # ============================
  # Broker 2: RabbitMQ con UI de management
  # ============================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ecommerce-net

  # ============================
  # Servicios de Luna
  # ============================
  order_api:
    build:
      context: ./services/order_api
    container_name: order_api
    ports:
      - "3000:3000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - PORT=3000
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  order_processor:
    build:
      context: ./services/order_processor
    container_name: order_processor
    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  analytics_service:
    build:
      context: ./services/analytics_service
    container_name: analytics_service
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  # ============================
  # Servicios de Nicolas
  # ============================
  billing_worker:
    build:
      context: ./services/billing_worker
    container_name: billing_worker
    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  inventory_worker:
    build:
      context: ./services/inventory_worker
    container_name: inventory_worker
    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  notification_worker:
    build:
      context: ./services/notification_worker
    container_name: notification_worker
    environment:
      - KAFKA_BROKER=kafka:9092
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

  # ============================
  # Servicio de Steven
  # ============================
  dashboard_aggregator:
    build:
      context: ./services/dashboard_aggregator
    container_name: dashboard_aggregator
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
