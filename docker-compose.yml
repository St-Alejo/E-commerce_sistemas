# docker-compose.yml — Sprint 0
# Solo Kafka y RabbitMQ. Los microservicios los agrega Steven via PR
# conforme cada persona (Luna, Nicolas) termine su servicio.
#
# Como validar el Sprint 0:
#   docker compose up
# Luego abrir http://localhost:15672 (guest/guest) y ver la UI de RabbitMQ.

services:
  # ============================
  # Broker 1: Kafka (modo KRaft, sin Zookeeper)
  # ============================
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [ecommerce-net]

  # ============================
  # Broker 2: RabbitMQ con UI de management
  # ============================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [ecommerce-net]

  # ============================
  # Microservicios: se agregaran uno por uno via Pull Request
  # cuando cada persona termine su servicio:
  #
  # - order_api          (Luna)
  # - order_processor    (Luna)
  # - analytics_service  (Luna)
  # - billing_worker     (Nicolas)
  # - inventory_worker   (Nicolas)
  # - notification_worker (Nicolas)
  # - dashboard_aggregator (Steven)
  # ============================

networks:
  ecommerce-net:
    driver: bridge
