services:
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [ecommerce-net]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [ecommerce-net]

  order_api:
    build: ./services/order_api
    container_name: order_api
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKER: kafka:9092
      PORT: "3000"
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [ecommerce-net]
    restart: unless-stopped

  order_processor:
    build: ./services/order_processor
    container_name: order_processor
    environment:
      KAFKA_BROKER: kafka:9092
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ecommerce-net]
    restart: unless-stopped

  analytics_service:
    build: ./services/analytics_service
    container_name: analytics_service
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks: [ecommerce-net]
    restart: unless-stopped

networks:
  ecommerce-net:
    driver: bridge
